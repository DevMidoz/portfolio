<section id="education" class="section education">
  <div class="container">
    <div class="section-head" appReveal>
      <span class="eyebrow">Background</span>
      <h2 class="section-title">Education &amp; Certifications</h2>
    </div>

    <div class="education-grid">
      @for (item of education; track item.degree) {
        <div class="edu-card" appReveal>
          <div class="edu-icon">
            <app-icon name="graduation-cap" [size]="22" />
          </div>
          <div>
            <h3>{{ item.degree }}</h3>
            <p class="edu-school">{{ item.school }}</p>
            <span class="edu-date">{{ item.start }} — {{ item.end }}</span>
          </div>
        </div>
      }

      @for (cert of certifications; track cert.title) {
        <div class="edu-card" appReveal [revealDelay]="90">
          <div class="edu-icon">
            <app-icon name="award" [size]="22" />
          </div>
          <div>
            <h3>{{ cert.title }}</h3>
            <p class="edu-school">{{ cert.issuer }}</p>
            <span class="edu-date">{{ cert.year }}</span>
          </div>
        </div>
      }
    </div>
  </div>
</section>
