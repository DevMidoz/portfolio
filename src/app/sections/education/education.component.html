<section id="education" class="dashboard-panel" appReveal>
  <div class="panel-header">
    <span class="panel-icon">
      <app-icon name="graduation-cap" [size]="20" />
    </span>
    <div>
      <span class="panel-eyebrow">Background</span>
      <h2 class="panel-title">Education &amp; Certifications</h2>
    </div>
  </div>

  <div class="panel-body">
    <div class="edu-columns">
      <div class="edu-column">
        <h3 class="edu-column-title">
          <app-icon name="graduation-cap" [size]="15" />
          Education
        </h3>
        <div class="edu-list">
          @for (item of education; track item.degree) {
            <div class="edu-item" appReveal>
              <h4>{{ item.degree }}</h4>
              <p class="edu-school">{{ item.school }}</p>
              <span class="edu-date">{{ item.start }} — {{ item.end }}</span>
            </div>
          }
        </div>
      </div>

      <div class="edu-column">
        <h3 class="edu-column-title">
          <app-icon name="award" [size]="15" />
          Certifications
        </h3>
        <div class="edu-list">
          @for (cert of certifications; track cert.title) {
            <div class="edu-item" appReveal [revealDelay]="90">
              <h4>{{ cert.title }}</h4>
              <p class="edu-school">{{ cert.issuer }}</p>
              <span class="edu-date">{{ cert.year }}</span>
            </div>
          }
        </div>
      </div>
    </div>
  </div>

  <button type="button" class="panel-scroll-hint" appPanelScroll aria-label="Scroll for more education items">
    <app-icon name="arrow-down" [size]="14" />
  </button>
</section>
